$engine: 3
$onesync: on
name: QBCore + Ox Ecosystem
version: 1.0.1
author: EricD-UltimoRefugio
description: QBCore Framework con Ox Inventory, Target, Doorlock y Lib. Incluye de serie los módulos de policía, ambulancia y banca.

tasks:
  #  Download Base Files (Configs & SQL)
  - action: download_github
    src: https://github.com/ultimorefugio80-code/Receta-Qb-Ox
    ref: main
    dest: ./tmp/theorder

  - action: move_path
    src: ./tmp/theorder/server.cfg
    dest: ./server.cfg

  - action: set_convar
    name: "sv_enforceGameBuild"
    value: "3570"

  - action: set_convar
    name: "sets locale"
    value: "es-ES"

  - action: set_convar
    name: "sets 🎭Rol"
    value: "🧬Supervivencia"

  - action: set_convar
    name: "sets 🌆Framework"
    value: "QB-Core + Ox"

  # Prepare Database
  - action: connect_database
  - action: query_database
    file: ./tmp/theorder/sqlfiles/qbcore.sql

  # Libs
  - action: download_github
    dest: ./resources/[libs]/community_bridge
    ref: main
    src: https://github.com/TheOrderFivem/community_bridge/

  - action: move_path
    src: ./tmp/theorder/edits/community_bridge/settings/clientConfig.lua
    dest: ./resources/[libs]/community_bridge/settings/clientConfig.lua
    overwrite: true

  - action: move_path
    src: ./tmp/theorder/edits/community_bridge/settings/serverConfig.lua
    dest: ./resources/[libs]/community_bridge/settings/serverConfig.lua
    overwrite: true

  - action: move_path
    src: ./tmp/theorder/edits/community_bridge/settings/sharedConfig.lua
    dest: ./resources/[libs]/community_bridge/settings/sharedConfig.lua
    overwrite: true

  # QB-CORE EDITS
  - action: move_path
    src: ./tmp/theorder/edits/qb-core/shared/jobs.lua
    dest: ./resources/[qb]/qb-core/shared/jobs.lua
    overwrite: true

  - action: move_path
    src: ./tmp/theorder/edits/qb-core/shared/config.lua
    dest: ./resources/[qb]/qb-core/shared/config.lua
    overwrite: true

  # QB-SMALLRESOURCES EDITS
  - action: move_path
    src: ./tmp/theorder/edits/qb-smallresources/config.lua
    dest: ./resources/[qb]/qb-smallresources/config.lua
    overwrite: true

  # CFX DEFAULT
  - action: download_github
    src: https://github.com/citizenfx/cfx-server-data
    subpath: resources
    dest: ./resources/[cfx-default]
  - action: remove_path
    path: ./resources/[cfx-default]/[gameplay]/chat

  # STANDALONE & DEPENDENCIES
  - action: download_github
    dest: ./resources/[standalone]/bob74_ipl
    ref: master
    src: https://github.com/Bob74/bob74_ipl

  - action: download_github
    dest: ./resources/[standalone]/screenshot-basic
    ref: master
    src: https://github.com/citizenfx/screenshot-basic

  - action: download_github
    dest: ./resources/[standalone]/progressbar
    ref: main
    src: https://github.com/qbcore-framework/progressbar

  - action: download_github
    dest: ./resources/[standalone]/xsound
    ref: master
    src: https://github.com/Xogy/xsound

  - action: download_github
    dest: ./resources/[standalone]/PolyZone
    ref: master
    src: https://github.com/qbcore-framework/PolyZone

  - action: download_github
    dest: ./resources/[standalone]/interact-sound
    ref: master
    src: https://github.com/qbcore-framework/interact-sound

  # OX ECOSYSTEM
  - action: download_file
    path: ./tmp/ox_lib.zip
    url: https://github.com/overextended/ox_lib/releases/latest/download/ox_lib.zip

  - action: unzip
    dest: ./resources/[ox]
    src: ./tmp/ox_lib.zip

  - action: download_file
    path: ./tmp/ox_target.zip
    url: https://github.com/overextended/ox_target/releases/latest/download/ox_target.zip

  - action: unzip
    dest: ./resources/[ox]
    src: ./tmp/ox_target.zip

  - action: download_file
    path: ./tmp/ox_inventory.zip
    url: https://github.com/overextended/ox_inventory/releases/latest/download/ox_inventory.zip

  - action: unzip
    dest: ./resources/[ox]
    src: ./tmp/ox_inventory.zip

  - action: download_file
    path: ./tmp/ox_doorlock.zip
    url: https://github.com/overextended/ox_doorlock/releases/latest/download/ox_doorlock.zip

  - action: unzip
    dest: ./resources/[ox]
    src: ./tmp/ox_doorlock.zip

  - action: download_file
    path: ./tmp/oxmysql.zip
    url: https://github.com/overextended/oxmysql/releases/latest/download/oxmysql.zip

  - action: unzip
    dest: ./resources/[ox]
    src: ./tmp/oxmysql.zip

  # VOICE
  - action: download_github
    dest: ./resources/[voice]/pma-voice
    ref: main
    src: https://github.com/AvarianKnight/pma-voice

  # QBCORE RESOURCES (Filtered)
  - action: download_github
    dest: ./resources/[qb]/qb-core
    ref: main
    src: https://github.com/qbcore-framework/qb-core

  - action: download_github
    dest: ./resources/[qb]/qb-multicharacter
    ref: main
    src: https://github.com/qbcore-framework/qb-multicharacter

  - action: download_github
    dest: ./resources/[qb]/qb-spawn
    ref: main
    src: https://github.com/qbcore-framework/qb-spawn

  - action: download_github
    dest: ./resources/[qb]/qb-hud
    ref: main
    src: https://github.com/qbcore-framework/qb-hud

  - action: download_github
    dest: ./resources/[qb]/qb-adminmenu
    ref: main
    src: https://github.com/qbcore-framework/qb-adminmenu

  - action: download_github
    dest: ./resources/[qb]/qb-management
    ref: main
    src: https://github.com/qbcore-framework/qb-management

  - action: download_github
    dest: ./resources/[qb]/qb-ambulancejob
    ref: main
    src: https://github.com/qbcore-framework/qb-ambulancejob

  - action: download_github
    dest: ./resources/[qb]/qb-policejob
    ref: main
    src: https://github.com/qbcore-framework/qb-policejob

  - action: download_github
    dest: ./resources/[qb]/qb-banking
    ref: main
    src: https://github.com/qbcore-framework/qb-banking

  - action: download_github
    dest: ./resources/[qb]/qb-radialmenu
    ref: main
    src: https://github.com/qbcore-framework/qb-radialmenu

  - action: download_github
    dest: ./resources/[qb]/qb-phone
    ref: main
    src: https://github.com/qbcore-framework/qb-phone

  - action: download_github
    dest: ./resources/[qb]/qb-garages
    ref: main
    src: https://github.com/qbcore-framework/qb-garages

  - action: download_github
    dest: ./resources/[qb]/qb-smallresources
    ref: main
    src: https://github.com/qbcore-framework/qb-smallresources

  - action: download_github
    dest: ./resources/[qb]/qb-interior
    ref: main
    src: https://github.com/qbcore-framework/qb-interior

  - action: download_github
    dest: ./resources/[qb]/qb-menu
    ref: main
    src: https://github.com/qbcore-framework/qb-menu

  - action: download_github
    dest: ./resources/[qb]/qb-input
    ref: main
    src: https://github.com/qbcore-framework/qb-input

  - action: download_github
    dest: ./resources/[qb]/qb-vehicleshop
    ref: main
    src: https://github.com/qbcore-framework/qb-vehicleshop

  # REPLACEMENTS
  - action: download_github
    dest: ./resources/[standalone]/cd_easytime
    ref: main
    src: https://github.com/dsheedes/cd_easytime

  - action: download_file
    path: ./tmp/illenium-appearance.zip
    url: https://github.com/iLLeniumStudios/illenium-appearance/releases/latest/download/illenium-appearance.zip

  - action: unzip
    dest: ./resources/[qb]
    src: ./tmp/illenium-appearance.zip

  # IMAGES FOR OX_INVENTORY
  - action: download_file
    path: ./tmp/RecipeImages.zip
    url: https://github.com/TheOrderFivem/RecipeImages/archive/refs/heads/main.zip

  - action: unzip
    dest: ./tmp/RecipeImages
    src: ./tmp/RecipeImages.zip

  - action: copy_path
    src: ./tmp/RecipeImages/RecipeImages-main/images
    dest: ./resources/[ox]/ox_inventory/web/images
    overwrite: true

  # Clean up
  - action: remove_path
    path: ./tmp
